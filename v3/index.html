<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMP RUN</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    user-select: none;
  }
  #title {
    color: #f0e040;
    font-size: 28px;
    letter-spacing: 8px;
    margin-bottom: 8px;
    text-shadow: 3px 3px 0 #b08000, 0 0 20px #f0e04088;
  }
  #subtitle {
    color: #888;
    font-size: 8px;
    letter-spacing: 3px;
    margin-bottom: 20px;
  }
  #game-wrapper {
    position: relative;
    border: 3px solid #f0e040;
    box-shadow: 0 0 30px #f0e04055, inset 0 0 30px #00000088;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: #0d0d15;
    border-top: 2px solid #333;
  }
  .hud-label { color: #666; font-size: 7px; letter-spacing: 1px; }
  .hud-value { color: #f0e040; font-size: 11px; margin-top: 3px; text-shadow: 0 0 10px #f0e040aa; }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    gap: 18px;
  }
  .overlay-title { color: #f0e040; font-size: 22px; text-shadow: 2px 2px 0 #b08000; letter-spacing: 4px; }
  .overlay-sub { color: #aaa; font-size: 8px; line-height: 2; text-align: center; letter-spacing: 1px; }
  .overlay-score { color: #ff8844; font-size: 13px; }
  .overlay-hi { color: #f0e040; font-size: 9px; }
  #start-btn {
    background: #f0e040;
    color: #0a0a0f;
    border: none;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 12px 28px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 3px 3px 0 #b08000;
  }
  #start-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #b08000; }
  #start-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #b08000; }
  .hidden { display: none !important; }
  #speed-bar-wrap { display: flex; flex-direction: column; align-items: flex-end; }
  #speed-bar-bg { width: 60px; height: 5px; background: #222; border: 1px solid #444; margin-top: 4px; }
  #speed-bar { height: 100%; background: #f0e040; width: 20%; transition: width 0.3s, background 0.3s; }
</style>
</head>
<body>

<div id="title">JUMP RUN</div>
<div id="subtitle">AVOID · SURVIVE · RUN</div>

<div id="game-wrapper">
  <canvas id="canvas" width="700" height="220"></canvas>
  <div id="hud">
    <div>
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="hud-score">0</div>
    </div>
    <div>
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="hud-best">0</div>
    </div>
    <div id="speed-bar-wrap">
      <div class="hud-label">SPEED</div>
      <div id="speed-bar-bg"><div id="speed-bar"></div></div>
    </div>
    <div>
      <div class="hud-label">LIVES</div>
      <div class="hud-value" id="hud-lives">♥ ♥ ♥</div>
    </div>
  </div>

  <div id="overlay">
    <div class="overlay-title">JUMP RUN</div>
    <div class="overlay-sub">
      クリック or スペース → ジャンプ<br>
      障害物を避けてひたすら走れ！
    </div>
    <button id="start-btn" onclick="startGame()">START</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 40;

const PALETTE = {
  sky: ['#0a0a1a','#0d1030','#111844'],
  ground: '#1a1a2e',
  groundLine: '#f0e040',
  player: '#f0e040',
  playerDark: '#b08000',
  obstacle: '#ff4444',
  obstacleDark: '#aa0000',
  obstacleWide: '#ff6a00',
  obstacleWideDark: '#aa3800',
  obstacleTall: '#cc22ff',
  obstacleTallDark: '#7700aa',
  star: '#ffffff',
};

let state = 'idle';
let score = 0, bestScore = 0, lives = 3;
let gameSpeed = 3.5;
let frameCount = 0;
let invincible = 0;

// Player y = top of body. Bottom of player = y + h.
// On ground: y + h == GROUND
const PLAYER_H = 32, PLAYER_W = 28;
const player = {
  x: 90,
  y: GROUND - PLAYER_H,
  w: PLAYER_W,
  h: PLAYER_H,
  vy: 0,
  onGround: true,
  frame: 0,
  frameTimer: 0,
  trail: [],
};

let obstacles = [];
let particles = [];
let stars = [];
let bgLayers = [{x:0,speed:0.3},{x:0,speed:0.6}];
let groundOffset = 0;
let spawnTimer = 0;

function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*(GROUND-20),
      size: Math.random()*1.5+0.5, twinkle: Math.random()*Math.PI*2 });
  }
}

// All obstacles sit ON the ground: y = GROUND - h, so bottom = GROUND.
function spawnObstacle() {
  const types = ['low','low','mid','tall','vtall','wide','wide_mid'];
  const type = types[Math.floor(Math.random()*types.length)];
  const configs = {
    low:      { w: 20, h: 30 },
    mid:      { w: 22, h: 46 },
    tall:     { w: 16, h: 68 },   // 縦に長い（細くて高い）
    vtall:    { w: 14, h: 85 },   // さらに縦に長い
    wide:     { w: 72, h: 22 },   // 横に長い（低くて幅広）
    wide_mid: { w: 58, h: 36 },   // 横に長い（中くらい）
  };
  const c = configs[type];
  obstacles.push({
    x: W + 20,
    y: GROUND - c.h,   // top of obstacle, bottom = GROUND
    w: c.w,
    h: c.h,
    type,
    speed: gameSpeed,
  });
}

function spawnParticle(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.5;
    const spd = 2 + Math.random() * 3;
    particles.push({
      x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd - 2,
      life: 1, color, size: 3 + Math.random()*3
    });
  }
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  state = 'playing';
  score = 0; lives = 3; gameSpeed = 3.5;
  frameCount = 0; spawnTimer = 0;
  obstacles = []; particles = [];
  player.y = GROUND - player.h;
  player.vy = 0; player.onGround = true;
  player.trail = [];
  invincible = 0;
  initStars();
  updateHUD();
  loop();
}

function jump() {
  if (state !== 'playing') return;
  if (player.onGround) {
    player.vy = -11;
    player.onGround = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
});
canvas.addEventListener('mousedown', e => { e.preventDefault(); jump(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

function updateHUD() {
  document.getElementById('hud-score').textContent = Math.floor(score);
  document.getElementById('hud-best').textContent = Math.floor(bestScore);
  const hearts = ['♥ ♥ ♥','♥ ♥ ·','♥ · ·','· · ·'];
  document.getElementById('hud-lives').textContent = hearts[3 - lives] || '· · ·';
  const spd = Math.min((gameSpeed - 3.5) / 6, 1);
  const bar = document.getElementById('speed-bar');
  bar.style.width = (20 + spd*80) + '%';
  bar.style.background = spd > 0.7 ? '#ff4444' : spd > 0.4 ? '#ff8844' : '#f0e040';
}

function drawPixelRect(x, y, w, h, color, shadow) {
  ctx.fillStyle = shadow || color;
  ctx.fillRect(x+2, y+2, w, h);
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawPlayer(x, y, frame) {
  // y = top of player body
  const px = Math.round(x), py = Math.round(y);
  const w = player.w, h = player.h;

  ctx.globalAlpha = invincible > 0 ? (Math.sin(frameCount*0.5) > 0 ? 0.4 : 1) : 1;

  ctx.fillStyle = PALETTE.playerDark;
  ctx.fillRect(px+2, py+2, w, h);
  ctx.fillStyle = PALETTE.player;
  ctx.fillRect(px, py, w, h);

  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(px+6, py+6, 5, 5);
  ctx.fillRect(px+16, py+6, 5, 5);
  ctx.fillStyle = PALETTE.player;
  ctx.fillRect(px+5, py+5, 4, 4);
  ctx.fillRect(px+15, py+5, 4, 4);

  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(px+2, py, 4, 4);
  ctx.fillRect(px+w-6, py, 4, 4);

  // Legs drawn below body (y + h)
  const legOff = player.onGround ? (frame % 2 === 0 ? 2 : 0) : 0;
  ctx.fillStyle = PALETTE.playerDark;
  ctx.fillRect(px+4, py+h, 8, 6 + legOff);
  ctx.fillRect(px+w-12, py+h, 8, 6 + (legOff > 0 ? 0 : 2));

  ctx.globalAlpha = 1;
}

function drawObstacle(obs) {
  const isWide = obs.type === 'wide' || obs.type === 'wide_mid';
  const isTall = obs.type === 'tall' || obs.type === 'vtall';
  const col  = isTall ? PALETTE.obstacleTall : isWide ? PALETTE.obstacleWide : PALETTE.obstacle;
  const dark = isTall ? PALETTE.obstacleTallDark : isWide ? PALETTE.obstacleWideDark : PALETTE.obstacleDark;
  drawPixelRect(obs.x, obs.y, obs.w, obs.h, col, dark);
  // Highlight marks
  ctx.fillStyle = isTall ? '#ee88ff' : isWide ? '#ffaa66' : '#ff8888';
  ctx.fillRect(obs.x+3, obs.y+3, Math.min(6, obs.w-6), 4);
  if (obs.w > 30) ctx.fillRect(obs.x+obs.w-9, obs.y+3, 6, 4);
  // Hatching on wide obstacles
  if (isWide) {
    ctx.fillStyle = dark;
    for (let xi = 0; xi < obs.w; xi += 12) ctx.fillRect(obs.x+xi, obs.y, 6, obs.h);
    ctx.fillStyle = col;
    for (let xi = 6; xi < obs.w; xi += 12) ctx.fillRect(obs.x+xi, obs.y, 6, obs.h);
  }
}

function drawGround() {
  ctx.fillStyle = PALETTE.ground;
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = PALETTE.groundLine;
  ctx.fillRect(0, GROUND, W, 2);

  ctx.fillStyle = '#2a2a40';
  for (let i = 0; i < 18; i++) {
    const x = ((i * 42) - groundOffset % 42);
    ctx.fillRect(x, GROUND + 5, 30, 4);
  }
  ctx.fillStyle = '#1a1a2e';
  for (let i = 0; i < 10; i++) {
    const x = ((i * 78) - groundOffset % 78);
    ctx.fillRect(x, GROUND + 12, 50, 6);
  }
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, GROUND);
  gradient.addColorStop(0, PALETTE.sky[0]);
  gradient.addColorStop(0.6, PALETTE.sky[1]);
  gradient.addColorStop(1, PALETTE.sky[2]);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, GROUND);

  frameCount++;
  stars.forEach(s => {
    s.twinkle += 0.04;
    const alpha = 0.5 + 0.5 * Math.sin(s.twinkle);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = PALETTE.star;
    ctx.fillRect(Math.round(s.x), Math.round(s.y), Math.ceil(s.size), Math.ceil(s.size));
  });
  ctx.globalAlpha = 1;

  bgLayers.forEach((layer, i) => {
    layer.x = (layer.x - layer.speed + W) % W;
    const color = i === 0 ? '#141428' : '#1a1a38';
    ctx.fillStyle = color;
    for (let j = 0; j < 3; j++) {
      const cx = (layer.x + j * 230) % W;
      ctx.beginPath();
      ctx.roundRect(cx, GROUND - 80 - i*30, 120 - i*20, 30 + i*20, 15);
      ctx.fill();
    }
  });
}

function update() {
  if (state !== 'playing') return;

  score += gameSpeed * 0.06;
  if (score > bestScore) bestScore = score;

  gameSpeed = 3.5 + Math.floor(score / 200) * 0.4;
  gameSpeed = Math.min(gameSpeed, 10);

  groundOffset += gameSpeed;

  player.trail.unshift({ x: player.x, y: player.y });
  if (player.trail.length > 6) player.trail.pop();

  if (!player.onGround) {
    player.vy += 0.55;
    player.y += player.vy;
    // Bottom of player = y + h; land when bottom reaches GROUND
    if (player.y + player.h >= GROUND) {
      player.y = GROUND - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  } else {
    player.frameTimer++;
    if (player.frameTimer > 8) { player.frame ^= 1; player.frameTimer = 0; }
  }

  if (invincible > 0) invincible--;

  // Spawn timer
  spawnTimer++;
  const interval = Math.max(55 - Math.floor(gameSpeed * 3), 28);
  if (spawnTimer >= interval) {
    spawnObstacle();
    spawnTimer = 0;
  }

  obstacles = obstacles.filter(o => o.x + o.w > -10);
  obstacles.forEach(o => { o.x -= o.speed; });

  // Collision detection: player rect top=y, bottom=y+h; obstacle top=oy, bottom=oy+oh
  if (invincible === 0) {
    for (const o of obstacles) {
      const margin = 4;
      const px1 = player.x + margin,  px2 = player.x + player.w - margin;
      const py1 = player.y + margin,  py2 = player.y + player.h - margin;
      const ox1 = o.x,                ox2 = o.x + o.w;
      const oy1 = o.y,                oy2 = o.y + o.h;
      if (px1 < ox2 && px2 > ox1 && py1 < oy2 && py2 > oy1) {
        lives--;
        invincible = 90;
        spawnParticle(player.x + player.w/2, player.y + player.h/2, '#ff4444');
        if (lives <= 0) { state = 'gameover'; showGameover(); }
        break;
      }
    }
  }

  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.04;
  });

  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  player.trail.forEach((t, i) => {
    ctx.globalAlpha = (1 - i / player.trail.length) * 0.15;
    ctx.fillStyle = PALETTE.player;
    ctx.fillRect(Math.round(t.x), Math.round(t.y), player.w, player.h);
  });
  ctx.globalAlpha = 1;

  drawGround();
  obstacles.forEach(drawObstacle);
  drawPlayer(player.x, player.y, player.frame);

  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  if (state === 'playing') {
    ctx.fillStyle = '#f0e040';
    ctx.font = '9px "Press Start 2P"';
    ctx.fillText(Math.floor(score), W - 70, 20);
  }
}

let lastTime = 0;
function loop(ts = 0) {
  if (state !== 'playing') return;
  if (ts - lastTime >= 16) {
    update();
    draw();
    lastTime = ts;
  }
  requestAnimationFrame(loop);
}

function showGameover() {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  ov.innerHTML = `
    <div class="overlay-title">GAME OVER</div>
    <div class="overlay-score">SCORE: ${Math.floor(score)}</div>
    <div class="overlay-hi">BEST: ${Math.floor(bestScore)}</div>
    <button id="start-btn" onclick="startGame()" style="background:#f0e040;color:#0a0a0f;border:none;font-family:'Press Start 2P',monospace;font-size:11px;padding:12px 28px;cursor:pointer;letter-spacing:2px;box-shadow:3px 3px 0 #b08000;">
      RETRY
    </button>
  `;
}

initStars();
draw();
</script>
</body>
</html>
