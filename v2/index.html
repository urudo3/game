<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Runner - 横スクロールアクション</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="stat-box">
                <span class="label">DISTANCE</span>
                <span id="score">0</span><span class="unit">m</span>
            </div>
            <div class="stat-box">
                <span class="label">LIFE</span>
                <div id="life-container">
                    <div class="heart"></div>
                    <div class="heart"></div>
                    <div class="heart"></div>
                </div>
            </div>
        </div>

        <div id="overlay" class="visible">
            <div id="start-screen" class="screen">
                <h1>NEON RUNNER</h1>
                <p>クリックまたはスペースキーで上昇<br>離すと下降</p>
                <button id="start-button">START GAME</button>
            </div>
            
            <div id="game-over-screen" class="screen hidden">
                <h1>GAME OVER</h1>
                <div class="final-stats">
                    <p>DISTANCE: <span id="final-score">0</span>m</p>
                </div>
                <button id="restart-button">RETRY</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
